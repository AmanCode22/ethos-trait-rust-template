name: Build for windows

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - arch: x64
            msvc_arch: x64
            target: x86_64-pc-windows-msvc
            asset_suffix: x86_64
          - arch: ARM64
            msvc_arch: amd64_arm64
            target: aarch64-pc-windows-msvc
            asset_suffix: arm64

    steps:
      - name: Checkout trait
        uses: actions/checkout@v4
        
      
      - name: Configure MSVC Environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}
          
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        
      - name: Read trait name from Cargo.toml
        id: config
        shell: pwsh
        run: |
      
          $content = Get-Content Cargo.toml -Raw
          if ($content -match '(?s)\[lib\].*?name\s*=\s*"([^"]+)"') {
      
              $name = $matches[1] -replace '-', '_'
              echo "trait_name=$name" >> $env:GITHUB_OUTPUT
          } else {
              Write-Error "Could not find [lib] name in Cargo.toml"
              exit 1
          }

      - name: Upload to GitHub Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
      
      
          file: target/${{ matrix.target }}/release/${{ steps.config.outputs.trait_name }}.dll
          asset_name: ${{ steps.config.outputs.trait_name }}-windows-${{ matrix.asset_suffix }}.dll
          tag: ${{ github.event.inputs.tag_name }}  
          overwrite: true

  trigger-termux:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Trigger termux workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "Build for termux" \
            --ref ${{ github.ref_name }} \
            -f tag_name="${{ github.event.inputs.tag_name }}" \
            --repo ${{ github.repository }}
