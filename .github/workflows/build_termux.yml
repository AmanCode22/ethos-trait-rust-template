name: Build for Termux

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - arch: aarch64
            ndk_abi: arm64-v8a
            rust_target: aarch64-linux-android
            asset_suffix: arm64
            needs_qemu: false
          - arch: armv7
            ndk_abi: armeabi-v7a
            rust_target: armv7-linux-androideabi
            asset_suffix: armv7
            needs_qemu: true

    steps:
      - uses: actions/checkout@v4
        
      
      - name: Setup QEMU for ARMv7
        if: matrix.needs_qemu
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm
          
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      
      - name: Install cargo-ndk
        run: cargo install cargo-ndk
          
      - name: Build with cargo-ndk
        run: cargo ndk -t ${{ matrix.ndk_abi }} build --release
        
      
      - name: Read trait name from Cargo.toml
        id: config
        run: |
          NAME=$(grep -A 3 '\[lib\]' Cargo.toml | grep '^name' | head -n 1 | cut -d'"' -f2)
          LIB_NAME=${NAME//-/_}
          echo "trait_name=$LIB_NAME" >> $GITHUB_OUTPUT
        
      - name: Upload to GitHub Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
      
          file: target/${{ matrix.rust_target }}/release/lib${{ steps.config.outputs.trait_name }}.so
          asset_name: ${{ steps.config.outputs.trait_name }}-termux-${{ matrix.asset_suffix }}.so
          tag: ${{ github.event.inputs.tag_name }}
          overwrite: true

  trigger-pr-creation:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Trigger PR manifest creation workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "Create PR manifest" \
            --ref ${{ github.ref_name }} \
            -f tag_name="${{ github.event.inputs.tag_name }}" \
            --repo ${{ github.repository }}
