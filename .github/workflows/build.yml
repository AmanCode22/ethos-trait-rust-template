name: Build for MacOS and Linux

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x86_64
            ext: so
            asset_suffix: linux-x86_64
          - os: ubuntu-24.04-arm
            platform: linux
            asset_suffix: linux-arm64
            arch: arm64
            ext: so
          - os: macos-15-intel
            platform: macos
            arch: intel
            ext: dylib
            asset_suffix: macos-intel
          - os: macos-latest
            platform: macos
            arch: arm64
            ext: dylib
            asset_suffix: macos-arm64
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        
      
      - name: Build release
        run: cargo build --release
        
      
      - name: Read trait name from Cargo.toml
        id: config
        run: |
          # Grab the 'name' strictly under the [lib] section
          NAME=$(grep -A 3 '\[lib\]' Cargo.toml | grep '^name' | head -n 1 | cut -d'"' -f2)
          # Cargo automatically replaces hyphens with underscores in compiled file names
          LIB_NAME=${NAME//-/_}
          echo "trait_name=$LIB_NAME" >> $GITHUB_OUTPUT

      - name: Upload to GitHub Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
      
          file: target/release/lib${{ steps.config.outputs.trait_name }}.${{ matrix.ext }}
          asset_name: ${{ steps.config.outputs.trait_name }}-${{ matrix.asset_suffix }}.${{ matrix.ext }}
          tag: ${{ github.ref_name }}
          overwrite: true

  trigger-windows:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Trigger windows workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "Build for windows" \
            --ref ${{ github.ref_name }} \
            -f tag_name="${{ github.event.release.tag_name }}" \
            --repo ${{ github.repository }}
